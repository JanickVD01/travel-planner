name: pr-preview
# PR -> validate (on the merge ref, to catch conflicts) -> deploy a demo-mode preview ->
# post/update a sticky comment with the link. Previews carry DEMO_API=1 and NO DB binding
# (configured on the Pages "Preview" environment), so they can never touch live data.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # default: the merge ref
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate-data.mjs

  preview:
    needs: validate
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      HEAD_REF: ${{ github.head_ref }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # deploy the PR head, not the merge ref
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy preview
        id: deploy
        run: |
          set -euo pipefail
          # Branch aliases can't contain "/"; sanitize for the --branch flag.
          SAFE_REF=$(echo "$HEAD_REF" | tr '/' '-' | tr -cd 'A-Za-z0-9-' | cut -c1-28)
          OUT=$(npx --yes wrangler@4 pages deploy public \
                  --project-name=travel-planner \
                  --branch="$SAFE_REF" \
                  --commit-hash="$HEAD_SHA" 2>&1 | tee /dev/stderr)
          URL=$(echo "$OUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' | head -n1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Sticky preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const marker = "<!-- pr-preview-sticky -->";
            const body = `${marker}\n### 🔍 Preview deployed\n\n**${url || "(deploy URL not captured — see the deploy step log)"}**\n\n> ⚠️ Demo mode — this preview runs on demo data (no database). Edits here are not saved and never touch production.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });

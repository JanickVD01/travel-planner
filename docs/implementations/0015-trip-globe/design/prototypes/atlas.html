<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Trip map — app-fidelity prototype</title>
  <script src="theme-init.js"></script>
  <link rel="preload" href="fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/instrument-sans.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="proto-app.css" />
</head>
<body>
  <!-- Faded map background layer (fixed, behind the app). atlas.js mounts the SVG here. -->
  <div id="trip-map" aria-hidden="true"></div>

  <header class="topbar">
    <button id="menu-toggle" class="icon-btn" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <a class="brand" href="#/" aria-label="Travel Planner home">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.3" fill="currentColor" stroke="none"/><circle cx="18" cy="18" r="2.3"/><path d="M6 8.6v2.9a4 4 0 0 0 4 4h3.4"/></svg>
      <span id="brand-title">Travel Planner</span>
    </a>
    <div class="spacer"></div>
    <div class="proto-ctl" role="group" aria-label="Prototype trip">
      <button data-trip="thailand">Thailand</button>
      <button data-trip="world">World</button>
    </div>
    <span id="who" class="who" title="Signed-in user">you@example.com</span>
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle light/dark theme">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/></svg>
    </button>
  </header>

  <div class="layout">
    <aside id="side" class="side">
      <nav id="nav" class="nav"><!-- built by proto-app.js --></nav>
    </aside>
    <main id="view" class="view"><!-- built by proto-app.js --></main>
  </div>

  <script src="vendor/d3.min.js"></script>
  <script src="vendor/topojson-client.min.js"></script>
  <script src="data.js"></script>
  <script src="atlas.js"></script>
  <script src="proto-app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Planner</title>
  <!-- Theme-before-paint: set data-theme before first paint to avoid a flash. -->
  <script>(function(){try{var t=localStorage.getItem("app-theme");
    if(t!=="light"&&t!=="dark")t=(matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";
    document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="demo-banner" class="demo-banner" hidden>Demo data — edits here are not saved.</div>

  <header class="topbar">
    <button id="menu-toggle" class="icon-btn" aria-label="Toggle menu">&#9776;</button>
    <a class="brand" href="#/">✈️ <span id="brand-title">Travel Planner</span></a>
    <div class="spacer"></div>
    <span id="who" class="who" title="Signed-in user"></span>
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">◑</button>
  </header>

  <div class="layout">
    <aside id="side" class="side">
      <nav id="nav" class="nav"><!-- filled by app.js --></nav>
    </aside>
    <main id="view" class="view"><!-- rendered by the hash router --></main>
  </div>

  <script src="app.js"></script>
</body>
</html>

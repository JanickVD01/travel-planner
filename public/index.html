<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Travel Planner</title>
  <!-- Theme-before-paint (externalized for a strict CSP; blocking so it runs before first paint). -->
  <script src="theme-init.js"></script>
  <meta name="theme-color" content="#fcfcfa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0e0f12" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Travel Planner" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
  <link rel="preload" href="fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/instrument-sans.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="demo-banner" class="demo-banner" hidden>Demo data — edits here are not saved.</div>

  <!-- Faded trip map layer (behind everything). Populated by map.js only on trip views; inert otherwise. -->
  <div id="trip-map" aria-hidden="true"></div>

  <header class="topbar">
    <button id="menu-toggle" class="icon-btn" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <a class="brand" href="#/" aria-label="Travel Planner home">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.3" fill="currentColor" stroke="none"/><circle cx="18" cy="18" r="2.3"/><path d="M6 8.6v2.9a4 4 0 0 0 4 4h3.4"/></svg>
      <span id="brand-title">Travel Planner</span>
    </a>
    <div class="spacer"></div>
    <span id="who" class="who" title="Signed-in user"></span>
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle light/dark theme">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/></svg>
    </button>
  </header>

  <div class="layout">
    <aside id="side" class="side">
      <nav id="nav" class="nav"><!-- filled by app.js --></nav>
    </aside>
    <main id="view" class="view"><!-- rendered by the hash router --></main>
  </div>

  <script src="vendor/anime.min.js"></script>
  <script src="vendor/d3.min.js"></script>
  <script src="vendor/topojson-client.min.js"></script>
  <script src="map.js"></script>
  <!-- PostHog (effort 0016): library from the EU assets host + our own deferred init (analytics.js).
       External <script src> (not the inline snippet) so no 'unsafe-inline' is needed; allowed by CSP
       script-src 'self' https://*.posthog.com. Init is gated to real prod sessions inside analytics.js. -->
  <script src="https://eu-assets.i.posthog.com/static/array.full.js"></script>
  <script src="analytics.js"></script>
  <script src="app.js"></script>
</body>
</html>
